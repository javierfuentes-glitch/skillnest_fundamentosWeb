<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
</head>
<body style="background-color:#e6e6e6; font-family: Arial;">

    <h1>Crear una cuenta en Discord</h1>

    <form>

        <div>
            <label>Nombre:</label>
            <input type="text" name="nombre">
        </div><br>

        <div>
            <label>Apellido:</label>
            <input type="text" name="apellido">
        </div><br>

        <div>
            <label>Correo electrónico:</label>
            <input type="text" name="correo" style="width: 250px;">
        </div><br>

        <div>
            <label>Contraseña:</label>
            <input type="password" name="password">
        </div><br>

        <div>
            <label>Confirmar contraseña:</label>
            <input type="password" name="confirmar">
        </div><br>

        <div>
            <label>Fecha de nacimiento:</label>
            <input type="date" name="fecha">
        </div><br>

        <div>
            <label>Género:</label>
            <input type="radio" name="genero"> Masculino
            <input type="radio" name="genero"> Femenino
            <input type="radio" name="genero"> Prefiero no decirlo
        </div><br>

        <div>
            <label>Descripción sobre ti:</label><br>
            <textarea rows="5" cols="30"></textarea>
        </div><br>

        <div>
            <label>Selecciona tus intereses:</label><br>
            <select size="4">
                <option>Música</option>
                <option>Películas</option>
                <option>Deportes</option>
                <option>Tecnología</option>
            </select>
        </div><br>

        <div>
            <input type="checkbox">
            <label>Al registrarte, aceptas los <a href="#">Términos y condiciones</a> de Discord.</label>
        </div><br>

        <div>
            <input type="submit" value="Registrarse">
        </div>

    </form>

</body>
</html>
